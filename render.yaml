databases:
  - name: animi-db
    plan: free
    databaseName: animi_db
    user: animi_user

services:
  - type: redis
    name: animi-redis
    plan: free
    ipAllowList: []

  - type: web
    name: animi-api
    runtime: docker
    rootDir: animface-backend
    dockerfilePath: ./Dockerfile
    autoDeploy: true
    healthCheckPath: /health
    startCommand: bash ./start-render.sh
    envVars:
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: SECRET_KEY
        generateValue: true
      - key: ANIME_MODEL
        value: mock
      - key: STORAGE_BACKEND
        value: local
      - key: LOCAL_UPLOAD_DIR
        value: uploads
      - key: DATABASE_URL
        fromDatabase:
          name: animi-db
          property: connectionString
      - key: SYNC_DATABASE_URL
        fromDatabase:
          name: animi-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: animi-redis
          property: connectionString
      - key: ALLOWED_ORIGINS
        sync: false
