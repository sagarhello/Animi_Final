services:
  # ─── PostgreSQL ──────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: animface_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: animface
      POSTGRES_PASSWORD: animface123
      POSTGRES_DB: animface_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U animface -d animface_db"]

      interval: 5s
      timeout: 5s
      retries: 5

  # ─── Redis (Celery broker + cache) ───────────────────
  redis:
    image: redis:7-alpine
    container_name: animface_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ─── FastAPI App ──────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: animface_api
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://animface:animface123@db:5432/animface_db
      SYNC_DATABASE_URL: postgresql://animface:animface123@db:5432/animface_db
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ─── Celery Worker (Anime conversion) ─────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: animface_worker
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://animface:animface123@db:5432/animface_db
      SYNC_DATABASE_URL: postgresql://animface:animface123@db:5432/animface_db
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=2 -Q anime_conversion

  # ─── Celery Flower (monitoring UI) ───────────────────
  flower:
    image: mher/flower:2.0
    container_name: animface_flower
    restart: unless-stopped
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
    ports:
      - "5555:5555"
    depends_on:
      - redis

volumes:
  postgres_data:
